<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Save Nature - Food Redistribution Portal</title>
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/auth.css">
    <script src="../js/utils.js"></script>
    <script src="../js/chatbot.js" defer></script>
    <script type="module" src="../js/auth.js"></script>
</head>

<body>
    <div class="sidebar"></div>
    <div class="header"></div>
    <nav class="donation-navbar">

        <a onclick="openPopup('food')">Food</a>

        <a onclick="openPopup('clothes')">Clothes</a>

        <a onclick="openPopup('books')">Books</a>

        <a onclick="openPopup('school_bags')">School Bags</a>

        <a onclick="openPopup('shoes')">Shoes</a>

        <a onclick="openPopup('toys')">Toys</a>

        <a onclick="openPopup('bicycles')">Bicycles</a>

    </nav>

    <main class="main-container">

        <!-- ================= LEFT PANEL : DONATION FORM ================= -->
        <section class="popup" id="popupContainer">

            <div class="popup-content">

                <h2 id="popupTitle">
                    Donate Surplus Food
                </h2>

                <form id="donationForm">

                    <!-- Dynamic Form Fields -->
                    <div id="formFields">

                        <!-- Filled by JavaScript -->

                    </div>


                    <!-- Location Section -->
                    <div class="form-group location-box">

                        <label>📍 Pickup Location</label>

                        <button type="button" id="geoBtn" class="btn btn-secondary">

                            📍 Get My Location

                        </button>

                        <input type="hidden" id="locationCoords">

                        <span id="locationStatus"></span>

                    </div>


                    <!-- Submit Button -->
                    <button type="submit" class="btn btn-primary">

                        List Item Now.

                    </button>

                </form>

            </div>

        </section>


        <!-- ================= RIGHT PANEL : AVAILABLE ITEMS ================= -->
        <section class="card dashboard-section">

            <div class="dashboard-header">

                <h2 id="dashboardTitle">
                    🍲 Available Food Nearby
                </h2>

            </div>


            <!-- No data message -->
            <div id="noFoodMessage" class="no-data">

                No active donations right now.

            </div>


            <!-- Dynamic Donation Cards -->
            <div id="foodList" class="food-grid">

            </div>

        </section>

    </main>
    <div class="footer"></div>

    <script src="/js/shared.js"></script>
    <script type="module" src="../js/script.js"></script>
</body>

</html>
