<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NGO Connect</title>
  <link rel="stylesheet" href="../css/style.css">
  <!-- FontAwesome for icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="../css/auth.css">

</head>

<body>

  <div class="sidebar"></div>
  <div class="header"></div>
  <div class="ngo-page-wrapper">
    <section class="ngo-header-banner">
      <h1>Save Nature NGO Connect</h1>
      <p>Donate Items & Connect to Help Those in Need</p>
    </section>

    <section class="ngo-controls">
      <div class="search-filter-row">
        <input type="text" id="ngoSearchInput" placeholder="Search by NGO Name...">
        <input type="text" id="ngoLocationInput" placeholder="Filter by Location...">
        <button id="ngoSearchBtn" class="ngo-btn ngo-search-btn">Search</button>
      </div>
      <div class="sort-row">
        <span class="sort-label">Sort by:</span>
        <select id="ngoSortSelect">
          <option value="all">All NGOs</option>
          <option value="newest">Newest</option>
          <option value="active">Most Active</option>
        </select>
        <select id="ngoLocationSelect">
          <option value="all">All Locations</option>
        </select>
        <button id="ngoFilterBtn" class="ngo-btn ngo-filter-btn">Apply Filter</button>
      </div>
    </section>

    <section class="ngo-grid-container">
      <div class="ngo-grid" id="ngoGrid">
        <!-- NGO Cards will be injected here -->
      </div>
      <div class="ngo-load-more-container">
        <button id="ngoLoadMoreBtn" class="ngo-btn ngo-load-more-btn">Load More</button>
      </div>
      <section class="ngo-donations-section">
        <h2>Incoming Donations</h2>
        <div id="donationList" class="donation-list"></div>
      </section>
      <script type="module" src="../js/ngo-dashboard.js"></script>
    </section>

    <section class="ngo-registration-section">
      <div class="ngo-reg-box">
        <h2>Register Your NGO</h2>
        <p>Add your NGO to connect with local donors!</p>
        <form id="ngoRegForm">
          <div class="form-grid">
            <div class="form-group">
              <label>NGO Name:</label>
              <input type="text" id="regNgoName" required>
            </div>
            <div class="form-group">
              <label>Location:</label>
              <input type="text" id="regLocation" required>
            </div>
            <div class="form-group">
              <label>Contact Email:</label>
              <input type="email" id="regEmail" required>
            </div>
            <div class="form-group">
              <label>Donate Email / Link:</label>
              <input type="text" id="regDonate" required>
            </div>
            <div class="form-group">
              <label>Phone Number:</label>
              <input type="text" id="regPhone" required>
            </div>
            <div class="form-group">
              <label>WhatsApp Number:</label>
              <input type="text" id="regWhatsapp" required>
            </div>
            <div class="form-group">
              <label>NGO Website (optional):</label>
              <input type="text" id="regWebsite">
            </div>
          </div>
          <div class="form-upload-row">
            <label>Upload NGO Image:</label>
            <input type="file" id="regImage" accept="image/*">
            <span class="file-chosen-text" id="fileChosenText">No file chosen</span>
            <button type="button" id="regCancelBtn" class="ngo-btn ngo-cancel-btn">Cancel</button>
            <button type="submit" class="ngo-btn ngo-submit-btn">Register</button>
          </div>
        </form>
      </div>
    </section>
  </div>
  <div class="footer"></div>

  <script src="/js/shared.js"></script>
  <script src="../js/utils.js"></script>
  <script src="../js/chatbot.js" defer></script>
  <script type="module" src="../js/auth.js"></script>
  <script type="module" src="../js/script.js"></script>
  <script type="module" src="../js/ngo.js"></script>
</body>

</html>
